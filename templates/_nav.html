<nav class="page-nav">
  <div class="nav-bar">

        <circle cx="11" cy="11" r="3" fill="none" stroke="currentColor" stroke-width="0.8" stroke-dasharray="1.2 1.2" opacity="0.35"/>

      <span class="nav-wordmark-text">quire</span>

    <span class="sep">/</span>
    <a class="nav-repo" href="/{{ repo }}">{{ repo }}</a>
