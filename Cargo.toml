[package]
name = "quire"
version = "0.1.0"
edition = "2024"

[[bin]]
name = "quire"
path = "src/bin/quire/main.rs"

[dependencies]
axum = "*"
base64 = "*"
mlua = { version = "*", features = ["lua54", "serde", "vendored"] }
regex = "*"
serde = { version = "*", features = ["derive"] }
clap = { version = "*", features = ["derive", "env"] }
clap_complete = "*"
miette = { version = "*", features = ["fancy"] }
fs-err = "*"
shell-words = "*"
thiserror = "*"
tokio = { version = "*", features = ["full"] }
tracing = "*"
tracing-subscriber = { version = "*", features = ["env-filter"] }
sentry = { version = "0.47.0", features = ["backtrace", "contexts", "debug-images", "panic", "release-health", "reqwest", "rustls", "tokio"], default-features = false }
sentry-tracing = "0.47.0"

[dev-dependencies]
assert_cmd = "*"
predicates = "*"
tempfile = "*"
serde_json = "*"
