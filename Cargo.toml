[workspace]
members = ["quire-ci", "quire-core", "quire-server"]
resolver = "3"

[workspace.dependencies]
fs-err = "*"
jiff = { version = "*", features = ["serde"] }
miette = "*"
mlua = { version = "*", features = ["lua54", "serde", "vendored", "error-send"] }
petgraph = "*"
regex = "*"
serde = { version = "*", features = ["derive"] }
serde_json = "*"
tempfile = "*"
thiserror = "*"
tracing = "*"
